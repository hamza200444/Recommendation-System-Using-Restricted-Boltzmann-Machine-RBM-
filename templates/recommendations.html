<!DOCTYPE html>
<html>

<head>
    <title>Recommendations</title>

    <style>

        body{
            background:#141414;
            color:white;
            font-family:Arial;
        }

          .container{
            display:grid;
            grid-template-columns:repeat(auto-fit, minmax(160px, 1fr));
            gap:15px;
            padding:20px;
            max-width:1300px;
            margin:auto;
        }

       .card{
            background:#222;
            border-radius:10px;
            overflow:hidden;
            padding:10px;
            text-align:center;
            cursor:pointer;
            transition:0.2s;
        }

       .card img{
            width:100%;
            height:230px;
            object-fit:cover;
            border-radius:8px;
        }
  h3{
            font-size:14px;
            margin:8px 0 4px 0;
        }

        p{
            font-size:12px;
            color:#bbb;
            margin:0;
        }

    </style>

</head>

<body>

<h1>Your Recommended Movies</h1>

<div class="container">

{% for movie in movies %}

<div class="card">

    <img src="{{ movie.poster_url }}">

    <h3>{{ movie.title }}</h3>

    <p>{{ movie.genres }}</p>


</div>

{% endfor %}

</div>

</body>
</html>
